<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NX Bank</title>

<style>
body { font-family: Arial; margin:0; padding:20px; background:#111; color:white; }
input,button,select { width:100%; padding:10px; margin:5px 0; }
.card { background:#222; padding:15px; margin-bottom:15px; border-radius:10px; }
.hidden { display:none; }
</style>

</head>
<body>

<div id="login">
  <div class="card">
    <h2>Login</h2>
    <input id="u" placeholder="username">
    <input id="p" type="password" placeholder="password">
    <button onclick="login()">Login</button>

    <h3>Create Account</h3>
    <input id="ru" placeholder="new user">
    <input id="rp" type="password">
    <button onclick="register()">Register</button>
  </div>
</div>

<div id="user" class="hidden">
  <div class="card">
    <h2 id="welcome"></h2>
    <p id="bal"></p>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Transfer</h3>
    <input id="to" placeholder="receiver">
    <input id="amt" type="number">
    <button onclick="transfer()">Send</button>
  </div>
</div>

<div id="admin" class="hidden">
  <div class="card">
    <h2>Admin Panel</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>Users</h3>
    <div id="list"></div>
  </div>

  <div class="card">
    <select id="target"></select>
    <input id="amount" type="number">
    <button onclick="add()">Add</button>
    <button onclick="sub()">Remove</button>
  </div>
</div>

<script>

const API = "https://nxbank.nevinnevin7.workers.dev";

let me=null;

async function login(){
const r=await fetch(API+"/login",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})});
const d=await r.json();
if(d.error)return alert(d.error);
me=d;

login.style.display="none";

if(d.role=="admin"){
admin.classList.remove("hidden");
load();
}else{
user.classList.remove("hidden");
welcome.innerText="Hi "+d.username;
bal.innerText="$"+d.balance;
}
}

async function register(){
await fetch(API+"/register",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:ru.value,password:rp.value})});
alert("done");
}

async function transfer(){
const r=await fetch(API+"/transfer",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({sender:me.username,receiver:to.value,amount:amt.value})});
alert((await r.json()).success?"sent":"error");
}

async function load(){
const r=await fetch(API+"/users");
const d=await r.json();
list.innerHTML="";
target.innerHTML="";
d.forEach(x=>{
list.innerHTML+=`<div>${x.username} $${x.balance}</div>`;
target.innerHTML+=`<option>${x.username}</option>`;
});
}

async function add(){
await fetch(API+"/admin/balance",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:target.value,amount:Number(amount.value),action:"add"})});
load();
}

async function sub(){
await fetch(API+"/admin/balance",{method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:target.value,amount:Number(amount.value),action:"subtract"})});
load();
}

function logout(){location.reload();}

</script>

</body>
</html>
