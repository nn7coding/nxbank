<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cloudflare Banking App</title>

  <style>
    :root {
      --bg: #f4f4f5;
      --card: #ffffff;
      --text: #111827;
      --border: #d1d5db;
      --accent: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f8fafc;
        --border: #334155;
        --accent: #3b82f6;
        --success: #22c55e;
        --danger: #ef4444;
      }
    }

    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
    }

    input, button, select {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .success {
      background: var(--success);
    }

    .danger {
      background: var(--danger);
    }

    .hidden {
      display: none;
    }

    .balance {
      font-size: 2rem;
      font-weight: bold;
      color: var(--success);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
      gap: 20px;
    }

    .account {
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <h1>USD Banking App</h1>

    <input id="loginUsername" placeholder="Username">
    <input id="loginPassword" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <hr>

    <h3>Create Account</h3>

    <input id="registerUsername" placeholder="Username">
    <input id="registerPassword" type="password" placeholder="Password">

    <button class="success" onclick="register()">
      Create Account
    </button>
  </div>

  <!-- USER VIEW -->
  <div id="userView" class="hidden">

    <div class="card">
      <h2 id="welcomeUser"></h2>

      <p>Balance</p>
      <div class="balance" id="userBalance">$0</div>

      <button class="danger" onclick="logout()">
        Logout
      </button>
    </div>

    <div class="card">
      <h3>Transfer Money</h3>

      <input id="transferUser" placeholder="Receiver Username">

      <input
        id="transferAmount"
        type="number"
        placeholder="Amount"
      >

      <button onclick="transferMoney()">
        Send Money
      </button>
    </div>

    <div class="card">
      <h3>Change Password</h3>

      <input
        id="newPassword"
        type="password"
        placeholder="New Password"
      >

      <button onclick="changePassword()">
        Change Password
      </button>
    </div>

  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" class="hidden">

    <div class="card">
      <h2>Bank Dashboard</h2>

      <button class="danger" onclick="logout()">
        Logout
      </button>
    </div>

    <div class="grid">

      <div class="card">
        <h3>All Accounts</h3>

        <div id="allUsers"></div>
      </div>

      <div class="card">
        <h3>Bank Controls</h3>

        <select id="bankUser"></select>

        <input
          id="bankAmount"
          type="number"
          placeholder="Amount"
        >

        <button class="success" onclick="addMoney()">
          Add Money
        </button>

        <button class="danger" onclick="removeMoney()">
          Remove Money
        </button>
      </div>

    </div>

  </div>

</div>

<script>

  // CHANGE THIS
  const API_URL = "https://YOUR-WORKER.workers.dev";

  let currentUser = null;

  // =========================
  // REGISTER
  // =========================
  async function register() {

    const username =
      document.getElementById("registerUsername").value;

    const password =
      document.getElementById("registerPassword").value;

    const res = await fetch(`${API_URL}/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username,
        password
      })
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    alert("Account created");
  }

  // =========================
  // LOGIN
  // =========================
  async function login() {

    const username =
      document.getElementById("loginUsername").value;

    const password =
      document.getElementById("loginPassword").value;

    const res = await fetch(`${API_URL}/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username,
        password
      })
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    currentUser = data;

    document.getElementById("loginView")
      .classList.add("hidden");

    if (data.role === "admin") {
      document.getElementById("adminView")
        .classList.remove("hidden");

      loadUsers();

    } else {
      document.getElementById("userView")
        .classList.remove("hidden");

      document.getElementById("welcomeUser")
        .innerText = `Welcome ${data.username}`;

      updateBalance(data.balance);
    }
  }

  // =========================
  // LOGOUT
  // =========================
  function logout() {

    currentUser = null;

    document.getElementById("loginView")
      .classList.remove("hidden");

    document.getElementById("userView")
      .classList.add("hidden");

    document.getElementById("adminView")
      .classList.add("hidden");
  }

  // =========================
  // BALANCE
  // =========================
  function updateBalance(balance) {

    document.getElementById("userBalance")
      .innerText =
      new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(balance);
  }

  // =========================
  // TRANSFER
  // =========================
  async function transferMoney() {

    const receiver =
      document.getElementById("transferUser").value;

    const amount =
      Number(document.getElementById("transferAmount").value);

    const res = await fetch(`${API_URL}/transfer`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        sender: currentUser.username,
        receiver,
        amount
      })
    });

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    alert("Transfer complete");

    location.reload();
  }

  // =========================
  // CHANGE PASSWORD
  // =========================
  async function changePassword() {

    alert(
      "Add the /change-password route in worker.js first."
    );
  }

  // =========================
  // LOAD USERS
  // =========================
  async function loadUsers() {

    const res = await fetch(`${API_URL}/users`);

    const users = await res.json();

    const usersDiv =
      document.getElementById("allUsers");

    const bankSelect =
      document.getElementById("bankUser");

    usersDiv.innerHTML = "";
    bankSelect.innerHTML = "";

    users.forEach(user => {

      const div = document.createElement("div");

      div.className = "account";

      div.innerHTML = `
        <strong>${user.username}</strong><br>
        Balance:
        ${new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD"
        }).format(user.balance)}
      `;

      usersDiv.appendChild(div);

      const option =
        document.createElement("option");

      option.value = user.username;
      option.innerText = user.username;

      bankSelect.appendChild(option);
    });
  }

  // =========================
  // ADD MONEY
  // =========================
  async function addMoney() {

    const username =
      document.getElementById("bankUser").value;

    const amount =
      Number(document.getElementById("bankAmount").value);

    await fetch(`${API_URL}/admin/balance`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username,
        amount,
        action: "add"
      })
    });

    loadUsers();
  }

  // =========================
  // REMOVE MONEY
  // =========================
  async function removeMoney() {

    const username =
      document.getElementById("bankUser").value;

    const amount =
      Number(document.getElementById("bankAmount").value);

    await fetch(`${API_URL}/admin/balance`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        username,
        amount,
        action: "subtract"
      })
    });

    loadUsers();
  }

</script>

</body>
</html>
